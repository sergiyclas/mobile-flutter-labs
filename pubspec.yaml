name: workspace_guard
description: "Workspace Guard that demonstrates when someone come in room or when the client is too close to the screen, it will show a warning message."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  connectivity_plus: ^7.1.0
  mqtt_client: 10.8.0
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  flash_toggle_plugin:
    git:
      url: https://github.com/sergiyclas/flash_toggle_plugin.git
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true